name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check orchid/

      - name: Test
        # ulimit: suite leaks fds across ~1700 tests and trips the runner's
        # default soft limit of 1024 near the end (see fd-leak issue).
        run: ulimit -n 4096 && uv run python -m pytest tests/ -x -q -m "not network" --timeout=120
