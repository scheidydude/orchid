# .orchid.yaml — per-project Orchid configuration
# All fields are optional — Orchid's defaults apply if omitted.

project: {project_name}
description: "{description}"

# Model preference: claude | local | auto
# Overrides routing.default from orchid.defaults.yaml
model_preference: auto

# Agent roles active for this project
agent_roles:
  - developer
  - researcher
  - reviewer

# Extra files to include in agent context (relative to project root)
# context_files:
#   - README.md
#   - docs/architecture.md

# Override memory settings (optional)
# memory:
#   compression_threshold: 8000

# Persistent web service configuration (orchid serve / D0033)
# persistent:
#   enabled: true             # include in persistent web service auto-discovery
#   auto_run: false           # run agent loop automatically when service starts
#   auto_run_schedule:        # optional cron schedule for auto runs
#     - "0 2 * * *"           # 2am daily
#   auto_run_code_model: auto # claude | local | auto
