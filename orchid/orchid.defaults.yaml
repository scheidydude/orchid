# Orchid configuration
# Override any value with environment variables (ORCHID_<SECTION>_<KEY>)

models:
  # Claude API — used for orchestration, review, complex reasoning
  claude:
    provider: anthropic
    model: claude-sonnet-4-6
    max_tokens: 8192
    temperature: 0.3

  # Local llama.cpp — used for bulk/draft/worker tasks
  local:
    provider: openai_compat
    base_url: "${LLAMA_BASE_URL:-http://localhost:8080/v1}"
    api_key: "${LLAMA_API_KEY:-none}"
    model: "${LLAMA_MODEL:-qwen3.5-35b-a3b-q6}"
    max_tokens: 4096
    temperature: 0.5

routing:
  # Task types routed to Claude API
  claude_tasks:
    - orchestrate
    - review
    - plan
    - critique
    - synthesize
    - rollup
  # Task types routed to local model
  local_tasks:
    - draft
    - search
    - transform
    - summarize
    - code_generate
  # Fallback when type is unknown
  default: local
  # Token threshold: tasks estimated above this use Claude
  complexity_token_threshold: 2000
  # Keyword-based escalation to Claude (auto mode)
  escalation:
    enabled: true
    keywords:
      - regex
      - parser
      - parsing
      - tokenize
      - ast
      - algorithm
      - concurrent
      - async
      - threading
      - cryptograph
      - compression
      - binary
      - protocol
      - authentication
      - oauth
      - jwt
      - security
      - optimize
      - performance
      - benchmark
      - websocket
      - serialize
      - deserializ
      - encoding
      - decoding
    threshold: 1

memory:
  hot_memory_file: CLAUDE.md
  tasks_file: tasks.md
  decisions_file: .orchid/decisions.json
  session_log_dir: .orchid/session_logs
  max_hot_memory_tokens: 4000
  compression_threshold: 6000   # compress when hot memory exceeds this

# ──────────────────────────────────────────────────────────────────────────────
# Agent Permissions — tool allowlist per agent type (T155-T156)
#
# Controls which tools each agent type is allowed to call.
# If a tool is not listed, the agent receives "[BLOCKED]" when attempting it.
#
# Resolution order:
#   1. Per-agent override in .orchid.yaml (agents.allowed_tools.<agent_name>)
#   2. Per-agent-type default below (agents.allowed_tools.<agent_type>)
#   3. Built-in defaults (all tools) when no override is set
#
# Example .orchid.yaml:
#
#   agents:
#     allowed_tools:
#       researcher:
#         - search
#         - fetch
#         - read_file
#         - list_dir
#         - bash
#       reviewer:
#         - read_file
#         - list_dir
#         - check_imports
#         - bash
#       developer:
#         - read_file
#         - write_file
#         - append_file
#         - list_dir
#         - bash
#         - check_imports
#         - get_task_files
#
# Built-in defaults (all agents): read_file, write_file, append_file, list_dir,
# bash, check_imports, get_task_files. Search and fetch are added by
# ResearcherAgent at runtime.
# ──────────────────────────────────────────────────────────────────────────────
agents:
  max_react_iterations: 50
  tool_timeout_seconds: 30
  bash_timeout_seconds: 60
  shell_mode: blocklist      # blocklist | allowlist
  shell_allowlist: []        # extra executables to permit in allowlist mode (merged with built-in defaults)
  verify_syntax_only: false  # T081: when true, skip runtime tests — only run py_compile/node --check
  environment: null          # T080: override auto-detected env (docker|venv|node|python|unknown)
  git_tools_enabled: true    # T166: register git tools (status, diff, log, commit, push, pull, branch)

  # Per-agent-type tool allowlists (override in .orchid.yaml)
  # Example:
  #   allowed_tools:
  #     researcher:
  #       - search
  #       - fetch
  #       - read_file
  #       - list_dir
  #       - bash
  #     reviewer:
  #       - read_file
  #       - list_dir
  #       - check_imports
  #       - bash
  #     developer:
  #       - read_file
  #       - write_file
  #       - append_file
  #       - list_dir
  #       - bash
  #       - check_imports
  #       - get_task_files
  #     discussion:
  #       - read_file
  #       - list_dir
  #     product_manager:
  #       - read_file
  #       - write_file
  #       - append_file
  #       - list_dir
  #       - bash
  #     project_manager:
  #       - read_file
  #       - write_file
  #       - append_file
  #       - list_dir
  #       - bash
  #       - check_imports
  #       - get_task_files
  #     orchestrator:
  #       - read_file
  #       - write_file
  #       - append_file
  #       - list_dir
  #       - bash
  #       - check_imports
  #       - get_task_files
  #     reviewer:
  #       - read_file
  #       - list_dir
  #       - check_imports
  #       - bash
  #     base:
  #       - read_file
  #       - write_file
  #       - append_file
  #       - list_dir
  #       - bash
  allowed_tools: {}

# projects_dir is no longer used — projects are standalone external repos

web_search:
  enabled: true
  backend: auto              # auto | searxng | brave | duckduckgo
  searxng_url: "${SEARXNG_URL:-https://searxng.scheidy.com}"
  max_results: 5
  max_page_chars: 8000
  embed_results: true        # auto-embed into vector store after search
  timeout_seconds: 10

delegation:
  enabled: true
  max_depth: 3
  max_sub_iterations: 5
  embed_results: true
  log_delegations: true

vector_memory:
  enabled: true
  chunk_size: 512
  chunk_overlap: 64
  n_results: 5
  embedding_model: nomic-embed-text
  fallback_model: all-MiniLM-L6-v2
  auto_recall_on_build: true
  auto_embed_on_save: true

telegram:
  enabled: false
  token: ""              # override with TELEGRAM_BOT_TOKEN env var
  allowed_users: []      # override with TELEGRAM_ALLOWED_USERS env var (comma-separated IDs)
  multi_project: false
  max_message_length: 4000
  progress_updates: true # send updates as tasks run, not just on completion
  notify_on:
    - session_start
    - task_start
    - task_complete
    - task_failed
    - task_blocked
    - session_complete
    - provider_unavailable

# Central bot configuration (D0050) — used by orchid serve --telegram/--slack/--bots
bots:
  telegram:
    enabled: false
    token: ""              # TELEGRAM_BOT_TOKEN env var
    allowed_users: []      # TELEGRAM_ALLOWED_USERS env var (comma-separated IDs)
    state_file: "~/.config/orchid/telegram-state.json"
  slack:
    enabled: false
    bot_token: ""          # SLACK_BOT_TOKEN env var (xoxb-)
    app_token: ""          # SLACK_APP_TOKEN env var (xapp-, requires Socket Mode)
    channels_file: "~/.config/orchid/slack-channels.json"
    auto_create_channels: true
    default_channel: "#orchid-general"

dependencies:
  enabled: true
  cycle_detection: true   # warn and skip if circular dependency detected

streaming:
  enabled: true
  telegram_progress_interval: 3   # send progress update every N iterations

slack:
  enabled: false
  bot_token: ""          # SLACK_BOT_TOKEN env var (xoxb-)
  app_token: ""          # SLACK_APP_TOKEN env var (xapp-, requires Socket Mode)
  default_channel: ""    # SLACK_DEFAULT_CHANNEL env var (#channel-name or C0XXXXXXX)
  thread_task_updates: true   # reply in task thread rather than posting to channel
  notify_on:
    - session_start
    - task_start
    - task_complete
    - task_failed
    - task_blocked
    - session_complete
    - provider_unavailable

web:
  enabled: false
  host: "0.0.0.0"
  port: 7842
  dev_mode: false
  cors_origins:
    - "http://localhost:5173"
    - "https://orchid.scheidy.com"

multi:
  enabled: false
  max_workers: 4                      # max parallel worker processes
  max_concurrent_claude_calls: 3      # multiprocessing.Semaphore value for Claude API
  restart_on_crash: true              # restart crashed workers automatically
  max_restarts: 3                     # give up after this many restarts per project
  worker_health_check_interval: 30    # seconds between health checks in coordinator
  projects: []                        # persistent project list for 'orchid multi start'

# Auto-discovery: scan directories for .orchid.yaml files (D0033)
discovery:
  enabled: false
  watch_dirs:
    - "${HOME}/LocalAI"
    - "${HOME}/Documents/Development"
  depth: 2
  exclude:
    - ".venv"
    - "node_modules"
    - ".git"
    - "__pycache__"
    - ".orchid"

# Rollup task type — synthesizes results from multiple completed tasks (D0037)
rollup:
  max_sources: 20           # max tasks to include in one rollup
  default_output: "ROLLUP-{task_id}.md"
  # To override the rollup provider, use providers.task_types.rollup in .orchid.yaml

# Auto-review: after N code_generate tasks, insert a review task (T043)
auto_review:
  enabled: false
  after_n_tasks: 3

# Auto-verify: after each code_generate task, queue a paired verify task (T083)
auto_verify: false

# Persistent serve: unified multi-project server (D0034)
serve:
  host: "0.0.0.0"
  port: 7842
  watch_dirs:
    - "${HOME}/LocalAI"
    - "${HOME}/Documents/Development"
  projects: []                        # explicit project paths outside watch dirs
  auto_discovery: true
  agent_manager: true

# Worktree — isolated git worktrees for parallel task execution (T170-T171)
worktree:
  enabled: false                       # set true to enable; off by default (opt-in)
  max_worktrees: 10                    # maximum concurrent worktrees per project
  auto_cleanup: true                   # auto-remove oldest worktree when limit reached
  base_ref: "HEAD"                     # git ref to branch from when creating worktrees
  auto_remove: true                  # auto-remove worktree after sub-agent completes
  commit_message: "worktree: task completion"  # commit message for worktree commits

# Provider registry — 7-layer resolution chain
# Layer 1: CLI --provider flag              (e.g. --provider developer=ollama)
# Layer 2: per-agent config below           (providers.<agent_type>)
# Layer 3: per-task-type config             (providers.task_types.<task_type>)
# Layer 4: task model: annotation           (model:claude in tasks.md)
# Layer 5: ORCHID_<AGENT_TYPE>_PROVIDER env var
# Layer 6: task-type defaults below         (providers.task_type_defaults.<task_type>)
# Layer 7: agent-type defaults below        (providers.agent_defaults.<agent_type>)
providers:
  # ── Layer 2: Per-agent overrides ────────────────────────────────────────────
  # Set any of these in your project's .orchid.yaml to override for that project.
  # Example: fully-local operation with Claude only for final review:
  #   providers:
  #     discussion: local
  #     product_manager: local
  #     project_manager: local
  #     developer: local
  #     reviewer: claude

  # ── Layer 3: Per-task-type overrides (uncomment to activate) ────────────────
  task_types: {}

  # ── Layer 6: Task-type defaults (configurable; override in .orchid.yaml) ────
  task_type_defaults:
    orchestrate:   claude
    review:        claude
    critique:      claude
    plan:          claude
    synthesize:    claude
    rollup:        claude
    draft:         local
    code_generate: local
    summarize:     local
    search:       local
    transform:     local
    research:      local

  # ── Layer 7: Agent-type defaults (configurable; override in .orchid.yaml) ───
  agent_defaults:
    orchestrator:    local
    reviewer:        local
    developer:       local
    researcher:      local
    base:            local
    discussion:      local
    product_manager: local
    project_manager: local

  # Named provider instances (add new providers here)
  # All built-in providers (claude, local) are always registered automatically.
  configured:
    claude:
      type: anthropic
      model: "${ANTHROPIC_MODEL:-claude-sonnet-4-6}"
      max_tokens: 8192
      temperature: 0.3

    local:
      type: local
      base_url: "${LLAMA_BASE_URL:-http://localhost:8080/v1}"
      api_key: "${LLAMA_API_KEY:-none}"
      model: "${LLAMA_MODEL:-qwen3.5-35b-a3b-q6}"
      embed_url: "${LLAMA_EMBED_URL:-http://localhost:8081/v1}"
      max_tokens: 8192
      temperature: 0.5

    # Uncomment to enable Ollama:
    # ollama:
    #   type: ollama
    #   base_url: "${OLLAMA_BASE_URL:-http://localhost:11434}"
    #   model: "${OLLAMA_MODEL:-qwen2.5-coder:32b}"

    # Uncomment to enable OpenAI:
    # openai:
    #   type: openai
    #   model: "${OPENAI_MODEL:-gpt-4o}"
    #   max_tokens: 4096
    #   temperature: 0.5

    # Uncomment to enable OpenRouter:
    # openrouter:
    #   type: openrouter
    #   model: "${OPENROUTER_MODEL:-anthropic/claude-sonnet-4-6}"

    # Uncomment to enable AWS Bedrock (requires boto3: uv pip install boto3):
    # bedrock:
    #   type: bedrock
    #   model: "${BEDROCK_MODEL:-anthropic.claude-sonnet-4-6-v1:0}"
    #   region: "${AWS_REGION:-us-east-1}"

# Gate system — controls human-in-the-loop approval for lifecycle transitions (V2)
gates:
  default: human                        # global fallback: require approval
  discussing_to_requirements: human
  requirements_to_planning: human
  planning_to_ready: human
  ready_to_executing: human
  milestone_to_milestone: auto          # auto-advance between milestones

# Prompt caching — reduces API token costs (D0048)
caching:
  enabled: true
  anthropic:
    cache_control: true         # add cache_control blocks for explicit caching
    min_cacheable_chars: 2048   # ~512 tokens — below this, cache overhead exceeds savings
  local:
    cache_prompt_hint: true     # send cache_prompt: true to llama.cpp for KV retention
    optimize_prefix_order: true # ensure stable content comes before dynamic content

# Lifecycle — project state machine settings (V2)
lifecycle:
  auto_git_init: true
  notify_on_gate: true
  warn_on_local_planning: true          # warn when using local model for PM agents

# ──────────────────────────────────────────────────────────────────────────────
# Hooks Configuration Schema (T092-T099)
# Extensible event-driven hook system for task lifecycle, phase transitions,
# agent loop events, and session events.
#
# Example configuration in .orchid.yaml:
#
#   hooks:
#     enabled: true
#     # Shell commands executed on events
#     shell_allowlist:
#       - echo
#       - curl
#       - notify-send
#       - git
#
#     # Task lifecycle hooks
#     tasks:
#       - name: notify_task_start
#         event: task_start
#         type: shell
#         command: echo "Task {{task_id}} started"
#         mode: background
#
#       - name: slack_on_complete
#         event: task_complete
#         type: http
#         url: https://hooks.slack.com/services/xxx
#         method: POST
#         payload_template: |
#           {
#             "text": "Task {{task_id}} completed: {{result}}"
#           }
#         mode: async
#
#     # Phase transition hooks
#     phases:
#       - name: notify_phase_change
#         event: phase_transition
#         type: shell
#         command: notify-send "Phase: {{from_phase}} → {{to_phase}}"
#         mode: background
#
#     # Agent loop hooks
#     agent:
#       - name: log_agent_action
#         event: agent_action
#         type: shell
#         command: echo "{{task_id}}: {{action}} {{input}}" >> agent.log
#         mode: background
#
#     # Session hooks
#     session:
#       - name: notify_session_start
#         event: session_start
#         type: shell
#         command: echo "Session started for {{project_name}}"
#         mode: background
#
# Event types:
#   - task_start: Task execution begins
#   - task_complete: Task completed successfully
#   - task_failed: Task failed or was blocked
#   - task_skipped: Task was skipped
#   - agent_action: Agent took an action in ReAct loop
#   - agent_observation: Agent received observation
#   - phase_transition: Phase changed (from_phase → to_phase)
#   - phase_enter: Entered new phase
#   - phase_exit: Exited current phase
#   - session_start: Session loaded
#   - session_end: Session closed
#
# Hook types:
#   - shell: Execute shell command (subject to allowlist)
#   - http: Make HTTP request (POST/GET)
#   - python: Call Python function (module.function)
#
# Execution modes:
#   - sync: Blocking — waits for hook to complete (default)
#   - async: Non-blocking with timeout
#   - background: Fire-and-forget, errors ignored
#
# Variable substitution in templates:
#   {{task_id}} - Task identifier
#   {{title}} - Task title
#   {{result}} - Task result (truncated)
#   {{from_phase}} - Previous phase
#   {{to_phase}} - New phase
#   {{project_name}} - Project name
#   {{action}} - Agent action name
#   {{input}} - Action input
#   {{observation}} - Agent observation
#   {{timestamp}} - ISO timestamp
#   {{event_type}} - Event type string
#   {{event_data}} - JSON of full event data
#   {{context.key}} - Context data by key
# ──────────────────────────────────────────────────────────────────────────────

hooks:
  enabled: false

  # Shell command allowlist (in addition to built-in safe commands)
  shell_allowlist: []

  # Circuit breaker for HTTP hooks — prevents cascading failures
  # when external endpoints (Slack/Telegram webhooks) are unreachable.
  #
  # States:
  #   CLOSED   — normal operation, requests pass through.
  #   OPEN     — failures exceeded threshold; requests rejected immediately.
  #   HALF_OPEN — after cooldown, one probe request is allowed through.
  #               Success → CLOSED. Failure → OPEN again.
  #
  # Each event type (task_complete, task_failed, phase_transition) gets its
  # own breaker so a flaky Slack webhook does not block Telegram notifications.
  circuit_breaker:
    enabled: true
    failure_threshold: 5      # consecutive failures before OPEN state
    recovery_timeout: 60      # seconds before transitioning to HALF_OPEN
    half_open_max_calls: 1    # probe calls allowed in HALF_OPEN state
    success_threshold: 1      # consecutive successes to return to CLOSED
    monitored_events:
      - task_complete         # HTTP hooks fired on task completion
      - task_failed           # HTTP hooks fired on task failure
      - phase_transition      # HTTP hooks fired on phase change
    # Per-event overrides (optional — merge with defaults above):
    # event_thresholds:
    #   task_complete:
    #     failure_threshold: 10     # more tolerant for completion webhooks
    #     recovery_timeout: 120
    #   task_failed:
    #     failure_threshold: 3      # less tolerant for failure notifications

  # Audit logging for hook invocations (T153)
  audit:
    enabled: true
    log_file: ".orchid/audit_log.jsonl"
    max_lines: 10000              # rotate after this many lines
    include_command_output: false # redact command stdout/stderr from logs

  # Task lifecycle hooks
  tasks: []

  # Phase transition hooks
  phases: []

  # Agent loop hooks
  agent: []

  # Session hooks
  session: []

# MCP Servers — external tool servers (D0051)
# Each server is defined by name, transport type, and connection parameters.
# The MCPManager reads this section and connects to servers at runtime.
#
# Transport types:
#   stdio — spawn a subprocess and communicate over stdin/stdout
#   http  — connect to an HTTP endpoint (SSE or JSON-RPC over HTTP)
#
# Example:
#   mcp_servers:
#     code_server:
#       transport: stdio
#       command: "npx"
#       args: ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]
#     search_server:
#       transport: http
#       url: "http://localhost:3100/mcp"
mcp_servers: {}